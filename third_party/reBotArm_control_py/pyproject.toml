[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rebotarm-control-py"
version = "0.1.0"
description = "Control library for reBot Arm B601 series robotic arms"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "meshcat>=0.3.2",
    "pin>=3.9.0",
    "numpy>=1.24.0",
    "pyyaml>=6.0",
    "matplotlib>=3.10.8",
    "motorbridge>=0.1.7",
]

[tool.setuptools.packages.find]
include = ["reBotArm_control_py*"]
